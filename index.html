<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agrofuturo - Projeto Agrinho</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .hero {
      display: flex;
      align-items: flex-start;
      gap: 30px;
      padding: 30px 20px;
    }
    .foto-campo {
      width: 60%;
      border-radius: 12px;
      animation: subir 1s ease-out;
    }
    .espaco-logo {
      flex: 1;
      text-align: center;
      color: #888;
      font-size: 14px;
      padding-top: 20px;
    }
    .texto {
      padding: 20px;
      max-width: 900px;
    }
    .faixa-verde {
      width: 100%;
      height: 20px;
      background: linear-gradient(90deg, #2e7d32 70%, #fbc02d 30%); /* Verde + amarelo igual no print */
      margin-top: 40px;
    }
    @keyframes subir {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    header .logo { display: flex; align-items: center; gap: 10px; }
    header .logo h1::after { content: " 🌱"; }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <h1>Agrofuturo</h1>
    </div>
    <nav>
      <a href="index.html">Início</a>
      <a href="galeria.html">Galeria</a>
      <a href="como-funciona.html">Como Funciona</a>
      <a href="beneficios.html">Benefícios</a>
      <a href="compra.html">Compra</a>
    </nav>
  </header>
  
  <main>
    <div class="hero">
      <img src="https://agronegocio.insumoagricola.com.br/wp-content/uploads/2022/02/agricultura-no-campo-copia.jpg" alt="Campo de agricultura" class="foto-campo">
      <div class="espaco-logo">
        <p>Espaço pra sua logo aqui</p>
      </div>
    </div>

    <div class="texto">
      <h2>Agrofuturo, Alimentando o Futuro</h2> <!-- Título do seu print -->
      <p>Produzir com respeito à terra é plantar o amanhã. O Agrofuturo une tecnologia e natureza para levar alimentos saudáveis para a sua casa.</p> <!-- Frase do print -->
    </div>

    <div class="faixa-verde"></div> <!-- A barra verde + amarela aqui -->
  </main>
  
  <footer>
    <p>© 2026 Agrofuturo - Projeto Agrinho</p>
  </footer>
</body>
</html>
