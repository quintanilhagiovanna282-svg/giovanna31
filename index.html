<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agrofuturo - Projeto Agrinho</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .hero {
      display: flex;
      align-items: flex-start;
      gap: 30px;
      padding: 30px 20px;
    }
    .foto-campo {
      width: 60%;
      border-radius: 12px;
      animation: subir 1s ease-out;
    }
    .espaco-logo {
      flex: 1;
      text-align: center;
      color: #888;
      font-size: 14px;
      padding-top: 20px;
    }
    .texto {
      padding: 20px;
      max-width: 900px;
      text-align: center;
    }
    .texto h2 {
      color: #2e7d32; /* Verde */
      font-size: 32px; /* Maior */
      margin-bottom: 15px;
    }
    .linha-verde {
      width: 100%;
      height: 8px;
      background: #a5d6a7; /* Verde clarinha */
      margin-top: 40px;
    }
    footer {
      background: #a5d6a7;
      text-align: center;
      padding: 10px;
      color: #1b5e20;
      font-weight: bold;
    }
    @keyframes subir {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    header .logo { display: flex; align-items: center; gap: 10px; }
    header .logo h1::after { content: " 🌱"; }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <h1>Agrofuturo</h1>
    </div>
    <nav>
      <a href="index.html">Início</a>
      <a href="galeria.html">Galeria</a>
      <a href="como-funciona.html">Como Funciona</a>
      <a href="beneficios.html">Benefícios</a>
      <a href="compra.html">Compra</a>
    </nav>
  </header>
  
  <main>
    <div class="hero">
      <img src="https://agronegocio.insumoagricola.com.br/wp-content/uploads/2022/02/agricultura-no-campo-copia.jpg" alt="Campo de agricultura" class="foto-campo">
      <div class="espaco-logo">
        <p>Espaço pra sua logo aqui</p>
      </div>
    </div>

    <div class="texto">
      <h2>Agrofuturo: Alimentando o Futuro</h2> <!-- Título 4 -->
      <p>Acredito que produzir com respeito ao meio ambiente é o futuro. O Agrofuturo leva comida saudável direto do campo.</p> <!-- Texto Tema 3 -->
    </div>

    <div class="linha-verde"></div>
  </main>
  
  <footer>
    <p>© 2026 Agrofuturo - Feito por Giovanna | Projeto Agrinho</p> <!-- Rodapé com seu nome -->
  </footer>
</body>
</html>
