<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galeria - Agrofuturo</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .galeria-container {
      max-width: 1100px;
      margin: 40px auto;
      padding: 0 20px;
      text-align: center;
    }
    .galeria-container h2 {
      color: #2e7d32;
      font-size: 36px;
      margin-bottom: 10px;
    }
    .galeria-container p {
      font-size: 18px;
      margin-bottom: 30px;
      color: #333;
    }
    .grid-fotos {
      display: grid;
      grid-template-columns: repeat(3, 1fr); /* 3 por linha = 3 linhas */
      gap: 20px;
    }
    .item-galeria {
      text-align: center;
      font-size: 16px;
      font-weight: bold;
      color: #2e7d32;
    }
    .item-galeria span {
      font-size: 40px;
      display: block;
      margin-bottom: 5px;
    }
    .item-galeria img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 12px;
      margin-top: 8px;
    }
    header .logo { display: flex; align-items: center; gap: 10px; }
    header .logo h1::after { content: " 🌱"; }
    .linha-verde {
      width: 100%;
      height: 8px;
      background: #a5d6a7;
      margin-top: 40px;
    }
    footer {
      background: #a5d6a7;
      text-align: center;
      padding: 10px;
      color: #1b5e20;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <h1>Agrofuturo</h1>
    </div>
    <nav>
      <a href="index.html">Início</a>
      <a href="galeria.html">Galeria</a>
      <a href="como-funciona.html">Como Funciona</a>
      <a href="beneficios.html">Benefícios</a>
      <a href="compra.html">Compra</a>
    </nav>
  </header>
  
  <main>
    <div class="galeria-container">
      <h2>Nossa Galeria</h2>
      <p>Veja um pouco do campo, da tecnologia e do futuro que a gente planta 🌱</p>
      
      <div class="grid-fotos">
        <!-- LINHA 1 -->
        <div class="item-galeria">
          <span>🌽</span>
          milho
          <img src="https://images.unsplash.com/photo-1587049352953-375637838e1f?q=80&w=400&h=400" alt="milho">
        </div>
        <div class="item-galeria">
          <span>🍓</span>
          morango
          <img src="https://images.unsplash.com/photo-1464965917751-99461c8c3b21?q=80&w=400&h=400" alt="morango">
        </div>
        <div class="item-galeria">
          <span>🫑</span>
          pimentão
          <img src="https://images.unsplash.com/photo-1519623830567-7630b14a1f77?q=80&w=400&h=400" alt="pimentão">
        </div>

        <!-- LINHA 2 -->
        <div class="item-galeria">
          <span>🥔</span>
          batata
          <img src="https://images.unsplash.com/photo-1513025385447-b4c01e7eb56f?q=80&w=400&h=400" alt="batata">
        </div>
        <div class="item-galeria">
          <span>🥕</span>
          cenoura
          <img src="https://images.unsplash.com/photo-1593291988976-5e2c8c7b33d3?q=80&w=400&h=400" alt="cenoura">
        </div>
        <div class="item-galeria">
          <span>🍊</span>
          laranja
          <img src="https://images.unsplash.com/photo-1547036967-23d11a082a88?q=80&w=400&h=400" alt="laranja">
        </div>

        <!-- LINHA 3 - AS 3 NOVAS QUE VOCÊ PEDIU -->
        <div class="item-galeria">
          <span>🎃</span>
          abóbora
          <img src="https://images.unsplash.com/photo-1505935428862-770b6f24fbfd?q=80&w=400&h=400" alt="abobora">
        </div>
        <div class="item-galeria">
          <span>🥬</span>
          alface
          <img src="https://images.unsplash.com/photo-1623428187969-5da2dcea5ebf?q=80&w=400&h=400" alt="alface">
        </div>
        <div class="item-galeria">
          <span>🫘</span>
          feijão
          <img src="https://images.unsplash.com/photo-1599599810769-bcde5a160d32?q=80&w=400&h=400" alt="feijao">
        </div>
      </div>
    </div>

    <div class="linha-verde"></div>
  </main>
  
  <footer>
    <p>© 2026 Agrofuturo - Feito por Giovanna | Projeto Agrinho</p>
  </footer>
</body>
</html>
