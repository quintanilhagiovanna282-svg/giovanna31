<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galeria - Agrofuturo</title>
  <link rel="stylesheet" href="style.css">
  <style>
    h2 {
      text-align: center;
      margin: 30px 0;
      color: #2d5a27;
    }
    .galeria {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); /* 3 fotos por linha no PC */
      gap: 20px;
      padding: 20px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .item {
      text-align: center;
      background: white;
      padding: 10px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .item img {
      width: 100%;
      height: 200px; /* Todas com mesma altura */
      object-fit: cover; /* Não distorce a foto */
      border-radius: 8px;
    }
    .item p {
      margin-top: 8px;
      font-weight: bold;
      color: #333;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <img src="https://cdn-icons-png.flaticon.com/512/628/628324.png" alt="Plantinha" width="40">
      <h1>Agrofuturo</h1>
    </div>
    <nav>
      <a href="index.html">Início</a>
      <a href="galeria.html">Galeria</a>
      <a href="como-funciona.html">Como Funciona</a>
      <a href="beneficios.html">Benefícios</a>
      <a href="comprar.html">Comprar</a>
    </nav>
  </header>
  
  <main>
    <h2>🌽 Galeria da Minha Roça 🍓</h2>
    <div class="galeria">
      
      <div class="item">
        <img src="COLE_O_LINK_DO_TOMATE_AQUI" alt="Tomate">
        <p>Tomate Vermelhinho</p>
      </div>
      
      <div class="item">
        <img src="COLE_O_LINK_DO_MILHO_AQUI" alt="Milho">
        <p>Milho da Roça</p>
      </div>
      
      <div class="item">
        <img src="COLE_O_LINK_DA_CENOURA_AQUI" alt="Cenoura">
        <p>Cenoura Fresca</p>
      </div>
      
      <div class="item">
        <img src="COLE_O_LINK_DO_MAXIXE_AQUI" alt="Maxixe">
        <p>Maxixe Verde</p>
      </div>
      
      <div class="item">
        <img src="COLE_O_LINK_DO_MORANGO_AQUI" alt="Morango">
        <p>Morango Doce</p>
      </div>
      
      <div class="item">
        <img src="COLE_O_LINK_DA_ALFACE_AQUI" alt="Alface">
        <p>Alface Crocante</p>
      </div>

      <div class="item">
        <img src="COLE_O_LINK_DA_UVA_AQUI" alt="Uva">
        <p>Uva Roxa</p>
      </div>
      
      <div class="item">
        <img src="COLE_O_LINK_DO_PIMENTAO_AQUI" alt="Pimentão">
        <p>Pimentão Colorido</p>
      </div>
      
      <div class="item">
        <img src="COLE_O_LINK_DA_ABOBORA_AQUI" alt="Abóbora">
        <p>Abóbora da Horta</p>
      </div>

    </div>
  </main>
  
  <footer>
    <p>© 2026 Agrofuturo - Projeto Agrinho</p>
  </footer>
</body>
</html>
