<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galeria - Agrofuturo</title>
  <link rel="stylesheet" href="style.css">
  <style>
    h2 {
      text-align: center;
      margin: 30px 0;
      color: #2d5a27;
      font-size: 2.2rem;
    }
    .galeria {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 25px;
      padding: 20px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .item {
      text-align: center;
      background: white;
      padding: 12px;
      border-radius: 12px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.08);
      opacity: 0;
      transform: translateY(40px);
      animation: subir 0.7s ease forwards;
    }
    .item img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 8px;
    }
    .item p {
      margin-top: 10px;
      font-weight: bold;
      color: #2d5a27;
      font-size: 1.1rem;
    }
    .item:nth-child(1) { animation-delay: 0.1s; }
    .item:nth-child(2) { animation-delay: 0.2s; }
    .item:nth-child(3) { animation-delay: 0.3s; }
    .item:nth-child(4) { animation-delay: 0.4s; }
    .item:nth-child(5) { animation-delay: 0.5s; }
    .item:nth-child(6) { animation-delay: 0.6s; }
    .item:nth-child(7) { animation-delay: 0.7s; }
    .item:nth-child(8) { animation-delay: 0.8s; }
    .item:nth-child(9) { animation-delay: 0.9s; }
    .item:nth-child(10) { animation-delay: 1.0s; }
    .item:nth-child(11) { animation-delay: 1.1s; }
    .item:nth-child(12) { animation-delay: 1.2s; }
    @keyframes subir { to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <img src="https://cdn-icons-png.flaticon.com/512/628/628324.png" alt="Plantinha" width="40">
      <h1>Agrofuturo</h1>
    </div>
    <nav>
      <a href="index.html">Início</a>

      <a href="como-funciona.html">Como Funciona</a>
      <a href="beneficios.html">Benefícios</a>
      <a href="comprar.html">Comprar</a>
    </nav>

  <main>

    <div class="galeria">
