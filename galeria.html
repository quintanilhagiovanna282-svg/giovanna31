<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galeria - Agrofuturo</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .galeria-container {
      max-width: 900px;
      margin: 40px auto;
      padding: 0 20px;
      text-align: center;
    }
    .galeria-container h2 {
      color: #2e7d32;
      font-size: 36px;
      margin-bottom: 10px;
    }
    .galeria-container p {
      font-size: 18px;
      margin-bottom: 30px;
      color: #333;
    }
    .grid-fotos {
      display: grid;
      grid-template-columns: repeat(3, 1fr); /* 3 colunas igual seu vídeo */
      gap: 40px;
      justify-items: center;
    }
    .item-galeria {
      text-align: center;
      font-size: 18px;
      font-weight: bold;
      color: #2e7d32;
    }
    .item-galeria span {
      font-size: 60px; /* Emoji grande igual você quer */
      display: block;
      margin-bottom: 8px;
    }
    header .logo { display: flex; align-items: center; gap: 10px; }
    header .logo h1::after { content: " 🌱"; }
    .linha-verde {
      width: 100%;
      height: 8px;
      background: #a5d6a7;
      margin-top: 40px;
    }
    footer {
      background: #a5d6a7;
      text-align: center;
      padding: 10px;
      color: #1b5e20;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <h1>Agrofuturo</h1>
    </div>
    <nav>
      <a href="index.html">Início</a>
      <a href="galeria.html">Galeria</a>
      <a href="como-funciona.html">Como Funciona</a>
      <a href="beneficios.html">Benefícios</a>
      <a href="compra.html">Compra</a>
    </nav>
  </header>
  
  <main>
    <div class="galeria-container">
      <h2>Nossa Galeria</h2>
      <p>Veja um pouco do campo, da tecnologia e do futuro que a gente planta 🌱</p>
      
      <div class="grid-fotos">
        <!-- COLUNA 1 -->
        <div class="item-galeria">
          <span>🌽</span>
          milho
        </div>
        <div class="item-galeria">
          <span>🥔</span>
          batata
        </div>
        <div class="item-galeria">
          <span>🎃</span>
          abóbora
        </div>

        <!-- COLUNA 2 -->
        <div class="item-galeria">
          <span>🍓</span>
          morango
        </div>
        <div class="item-galeria">
          <span>🥕</span>
          cenoura
        </div>
        <div class="item-galeria">
          <span>🥬</span>
          alface
        </div>

        <!-- COLUNA 3 -->
        <div class="item-galeria">
          <span>🫑</span>
          pimentão
        </div>
        <div class="item-galeria">
          <span>🍊</span>
          laranja
        </div>
        <div class="item-galeria">
          <span>🫘</span>
          feijão
        </div>
      </div>
    </div>

    <div class="linha-verde"></div>
  </main>
  
  <footer>
    <p>© 2026 Agrofuturo - Feito por Giovanna | Projeto Agrinho</p>
  </footer>
</body>
</html>
