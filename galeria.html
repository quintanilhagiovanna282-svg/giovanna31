<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galeria - Agrofuturo</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .galeria-container {
      max-width: 1100px;
      margin: 40px auto;
      padding: 0 20px;
      text-align: center;
    }
    .galeria-container h2 {
      color: #2e7d32;
      font-size: 36px;
      margin-bottom: 10px;
    }
    .galeria-container p {
      font-size: 18px;
      margin-bottom: 30px;
      color: #333;
    }
    .grid-fotos {
      display: grid;
      grid-template-columns: repeat(3, 1fr); /* 3 fotos por linha */
      gap: 20px;
    }
    .grid-fotos img {
      width: 100%;
      border-radius: 12px;
      transition: transform 0.3s ease;
    }
    .grid-fotos img:hover {
      transform: scale(1.05); /* Aumenta um pouco ao passar o mouse */
    }
    header .logo { display: flex; align-items: center; gap: 10px; }
    header .logo h1::after { content: " 🌱"; }
    .linha-verde {
      width: 100%;
      height: 8px;
      background: #a5d6a7;
      margin-top: 40px;
    }
    footer {
      background: #a5d6a7;
      text-align: center;
      padding: 10px;
      color: #1b5e20;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <h1>Agrofuturo</h1>
    </div>
    <nav>
      <a href="index.html">Início</a>
      <a href="galeria.html">Galeria</a>
      <a href="como-funciona.html">Como Funciona</a>
      <a href="beneficios.html">Benefícios</a>
      <a href="compra.html">Compra</a>
    </nav>
  </header>
  
  <main>
    <div class="galeria-container">
      <h2>Nossa Galeria</h2>
      <p>Veja um pouco do campo, da tecnologia e do futuro que a gente planta 🌱</p>
      
      <div class="grid-fotos">
        <!-- Troca só os links pelas suas fotos do Agrinho -->
        <img src="https://images.unsplash.com/photo-1500382017468-9049fed747ef?q=80&w=400" alt="Plantação">
        <img src="https://images.unsplash.com/photo-1625246333195-78d9c38ad449?q=80&w=400" alt="Trator no campo">
        <img src="https://images.unsplash.com/photo-1464226184884-6a242eab0a0a?q=80&w=400" alt="Mãos na terra">
        <img src="https://images.unsplash.com/photo-1523348837708-15d4a09cfac2?q=80&w=400" alt="Drone na lavoura">
        <img src="https://images.unsplash.com/photo-1574323347407-f5e1ad6d020b?q=80&w=400" alt="Colheita">
        <img src="https://images.unsplash.com/photo-1592496431122-2349e0fbc666?q=80&w=400" alt="Tecnologia no agro">
      </div>
    </div>

    <div class="linha-verde"></div>
  </main>
  
  <footer>
    <p>© 2026 Agrofuturo - Feito por Giovanna | Projeto Agrinho</p>
  </footer>
</body>
</html>
