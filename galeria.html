<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galeria - Agrofuturo</title>
  <style>
body { 
  font-family: Arial, sans-serif; 
  margin: 0; 
  background: #f5f5f5; 
}

header { 
  background: #2e7d32; 
  color: white; 
  padding: 8px; /* BARRA VERDE FININHA */
  text-align: center; 
}

header h1 {
  margin: 0;
  font-size: 1.8em;
}

header nav {
  font-size: 24px; /* PALAVRAS DO MENU GRANDES */
  font-weight: bold;
  margin-top: 5px;
}

header nav a {
  color: white; /* LINK BRANCO */
  text-decoration: none;
  margin: 0 12px; /* ESPAÇO ENTRE ELAS */
}

header nav a:hover {
  text-decoration: underline;
}

.galeria { 
  display: grid; 
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); 
  gap: 25px; 
  padding: 40px; 
  max-width: 1400px; 
  margin: auto; 
}

.card { 
  background: white; 
  border-radius: 12px; 
  box-shadow: 0 2px 8px rgba(0,0,0,0.1); 
  overflow: hidden; 
  text-align: center; 
  padding-bottom: 15px;
}

.card img { 
  width: 100%; 
  height: 180px; 
  object-fit: cover; 
}

.card h3 { 
  margin: 12px 0 5px; 
  color: #2e7d32; 
}

.card p { 
  margin: 0; 
  color: #555; 
  font-size: 0.9em; 
}  </style>
</head>
<body>
  <!-- MENU NA ORDEM CERTA: Início Galeria Como Funciona Benefícios Compra -->
  <header>
    <h1>Agrofuturo 🌱</h1>
    <nav>
      <a href="index.html">Início</a>
      <a href="galeria.html">Galeria</a>
      <a href="como-funciona.html">Como Funciona</a>
      <a href="beneficios.html">Benefícios</a>
      <a href="compra.html">Compra</a>
    </nav>
  </header>
  <main style="max-width: 1000px; margin: 0 auto; padding: 40px 20px; text-align: center;">
    <!-- TÍTULO SEM EMOJI COMO VOCÊ PEDIU -->
    <h2 style="color: #2e7d32; font-size: 36px; margin-bottom: 10px;">
      Conheça nossa galeria de alimentos
    </h2>
    <p style="font-size: 18px; color: #555; margin-bottom: 40px;">
      Veja um pouco do campo, da tecnologia e do futuro que a gente planta 🌱
    </p>
    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px;">
      <div class="alimento">
        <img src="imagens/cenoura.jpg" alt="Cenoura">
        <h3>Cenoura</h3>
      </div>
      <div class="alimento">
        <img src="imagens/batata.jpg" alt="Batata">
        <h3>Batata</h3>
      </div>
      <div class="alimento">
        <img src="imagens/morango.jpg" alt="Morango">
        <h3>Morango</h3>
      </div>
      <div class="alimento">
        <img src="imagens/tomate.jpg" alt="Tomate">
        <h3>Tomate</h3>
      </div>
      <div class="alimento">
        <img src="imagens/alface.jpg" alt="Alface">
        <h3>Alface</h3>
      </div>
      <div class="alimento">
        <img src="imagens/pimentao.jpg" alt="Pimentão">
        <h3>Pimentão</h3>
      </div>
      <div class="alimento">
        <img src="imagens/laranja.jpg" alt="Laranja">
        <h3>Laranja</h3>
      </div>
      <div class="alimento">
        <img src="imagens/soja.jpg" alt="Soja">
        <h3>Soja</h3>
      </div>
      <div class="alimento">
        <img src="imagens/milho.jpg" alt="Milho">
        <h3>Milho</h3>
      </div>
    </div>
  </main>
  <footer>
    <p>© 2025 Agrofuturo - Todos os direitos reservados</p>
  </footer>
</body>
</html>
